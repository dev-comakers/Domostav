<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #080c14;
      --surface:  #0f1623;
      --s2:       #161e2e;
      --border:   rgba(255,255,255,.08);
      --text:     #eef2fb;
      --muted:    #8a94ae;
      --accent:   #4f8cff;
      --amber:    #f59e0b;
      --wood:     #a85d18;
      --steel:    #6a6a80;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ambient glows ─────────────────────────────────── */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(100px);
      z-index: 0;
    }
    .blob-blue  { width:600px;height:600px;top:-200px;left:-150px;background:rgba(79,140,255,.07); }
    .blob-amber { width:500px;height:500px;bottom:-180px;right:-80px;background:rgba(245,158,11,.06); }

    /* ── layout ────────────────────────────────────────── */
    .wrap {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 64px;
      padding: 24px;
    }
    @media (max-width: 860px) {
      .wrap { flex-direction: column; gap: 32px; }
      .scene-col { display: none; }
    }

    /* ══════════════════════════════════════════════════════
       SCENE  (overflow:hidden so nothing bleeds into card)
    ══════════════════════════════════════════════════════ */
    .scene-col {
      width: 340px;
      height: 420px;
      position: relative;
      overflow: hidden;          /* ← nothing escapes the box */
      flex-shrink: 0;
    }

    /* ── wooden board / surface ────────────────────────── */
    .board {
      position: absolute;
      bottom: 80px;
      left: 40px;
      width: 260px;
      height: 28px;
      background: linear-gradient(180deg, #d4842a 0%, #a85d18 55%, #7c420e 100%);
      border-radius: 4px;
      box-shadow: 0 8px 24px rgba(0,0,0,.55), inset 0 2px 0 rgba(255,255,255,.12);
      z-index: 2;
    }
    /* subtle grain */
    .board::after {
      content:'';
      position:absolute;
      inset:0;
      border-radius:inherit;
      background: repeating-linear-gradient(90deg,
        transparent 0, transparent 22px,
        rgba(0,0,0,.07) 22px, rgba(0,0,0,.07) 24px
      );
    }
    /* board "thickness" shadow */
    .board::before {
      content:'';
      position:absolute;
      top:100%; left:2px; right:2px;
      height:8px;
      background: linear-gradient(180deg, #5a300a, transparent);
      border-radius:0 0 4px 4px;
    }

    /* ── nail ON TOP of the board ──────────────────────── */
    /* nail tip: 80+28=108px from bottom → scene top = 420-108=312px */
    .nail {
      position: absolute;
      bottom: 108px;             /* sits right on board top surface */
      left: 193px;               /* x center */
      width: 7px;
      margin-left: -3px;
      height: 28px;
      background: linear-gradient(180deg, #d8d8d8, #999);
      border-radius: 2px 2px 3px 3px;
      z-index: 3;
      animation: nail-sink 1.5s cubic-bezier(.4,0,.2,1) infinite;
    }
    .nail::before {              /* nail head cap */
      content: '';
      position: absolute;
      top: -6px; left: -5px;
      width: 17px; height: 8px;
      background: linear-gradient(135deg, #c8c8c8, #909090);
      border-radius: 3px;
    }
    @keyframes nail-sink {
      0%,35%  { height: 28px; }
      52%,60% { height: 14px; }
      100%    { height: 28px; }
    }

    /* ── HAMMER ────────────────────────────────────────────
       Pivot = top of SVG (= grip at top, head swings DOWN)
       At angle 0° head hits nail; starts at -68° (raised-left)
    ──────────────────────────────────────────────────────── */
    .hammer-group {
      position: absolute;
      /* pivot in scene: x=193 (above nail), y=90 */
      top: 90px;
      left: 155px;               /* 193 - 38 (half SVG width=76) */
      width: 76px;
      height: 200px;
      transform-origin: 50% 0%; /* pivot at grip = top of SVG */
      animation: hammer-swing 1.5s cubic-bezier(.4,0,.2,1) infinite;
      z-index: 4;
    }
    /* At angle=0°: head center ≈ 90 + 180 = 270px from top
       Board top at 420-108=312 → close enough with head height */
    @keyframes hammer-swing {
      0%    { transform: rotate(-68deg); }  /* raised high-left */
      32%   { transform: rotate(-68deg); }  /* hold at top */
      50%   { transform: rotate(4deg); }    /* STRIKE */
      54%   { transform: rotate(4deg); }    /* brief dwell */
      68%   { transform: rotate(-30deg); }  /* bounce */
      100%  { transform: rotate(-68deg); }  /* return */
    }

    /* ── sparks (at nail head position in scene) ─────────── */
    /* nail head: x=193, bottom=136px → top=420-136=284px */
    .sparks {
      position: absolute;
      left: 193px;
      top: 284px;
      width: 0; height: 0;
      z-index: 5;
      pointer-events: none;
    }
    .sp {
      position: absolute;
      border-radius: 50%;
      background: var(--amber);
      opacity: 0;
    }
    .sp:nth-child(1)  { width:4px;height:4px; animation:sp 1.5s .51s ease-out infinite; --dx:18px;  --dy:-22px; }
    .sp:nth-child(2)  { width:3px;height:3px; animation:sp 1.5s .53s ease-out infinite; --dx:-16px; --dy:-26px; background:#fcd34d; }
    .sp:nth-child(3)  { width:5px;height:5px; animation:sp 1.5s .50s ease-out infinite; --dx:26px;  --dy:-14px; background:#fbbf24; }
    .sp:nth-child(4)  { width:3px;height:3px; animation:sp 1.5s .55s ease-out infinite; --dx:-10px; --dy:-32px; background:#fef3c7; }
    .sp:nth-child(5)  { width:4px;height:4px; animation:sp 1.5s .52s ease-out infinite; --dx:12px;  --dy:-30px; }
    .sp:nth-child(6)  { width:2px;height:2px; animation:sp 1.5s .54s ease-out infinite; --dx:-24px; --dy:-20px; background:#fde68a; }
    .sp:nth-child(7)  { width:5px;height:5px; animation:sp 1.5s .51s ease-out infinite; --dx:30px;  --dy:-10px; }
    .sp:nth-child(8)  { width:3px;height:3px; animation:sp 1.5s .50s ease-out infinite; --dx:-28px; --dy:-14px; background:#fcd34d; }
    .sp:nth-child(9)  { width:4px;height:4px; animation:sp 1.5s .56s ease-out infinite; --dx:8px;   --dy:-36px; }
    .sp:nth-child(10) { width:2px;height:2px; animation:sp 1.5s .53s ease-out infinite; --dx:22px;  --dy:-28px; background:#fef9c3; }
    .sp:nth-child(11) { width:5px;height:5px; animation:sp 1.5s .49s ease-out infinite; --dx:-14px; --dy:-30px; }
    .sp:nth-child(12) { width:3px;height:3px; animation:sp 1.5s .55s ease-out infinite; --dx:34px;  --dy:-20px; background:#fbbf24; }
    .sp:nth-child(13) { width:4px;height:4px; animation:sp 1.5s .52s ease-out infinite; --dx:-32px; --dy:-24px; }
    .sp:nth-child(14) { width:2px;height:2px; animation:sp 1.5s .51s ease-out infinite; --dx:16px;  --dy:-38px; background:#fef3c7; }
    .sp:nth-child(15) { width:4px;height:4px; animation:sp 1.5s .54s ease-out infinite; --dx:-6px;  --dy:-40px; background:#f59e0b; }
    .sp:nth-child(16) { width:3px;height:3px; animation:sp 1.5s .50s ease-out infinite; --dx:38px;  --dy:-16px; background:#fcd34d; }
    @keyframes sp {
      0%   { opacity:0; transform:translate(0,0) scale(1); }
      4%   { opacity:1; }
      45%  { opacity:.9; transform:translate(var(--dx),var(--dy)) scale(.65); }
      100% { opacity:0; transform:translate(calc(var(--dx)*.8),calc(var(--dy)*1.9 + 18px)) scale(.15); }
    }

    /* impact flash */
    .flash {
      position: absolute;
      left: 163px; top: 254px;
      width: 64px; height: 64px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(253,211,77,.6), transparent 70%);
      opacity: 0; transform: scale(0);
      animation: flash-pop 1.5s .51s ease-out infinite;
      z-index: 3;
    }
    @keyframes flash-pop {
      0%   { opacity:0; transform:scale(0); }
      4%   { opacity:1; transform:scale(1); }
      28%  { opacity:0; transform:scale(1.5); }
      100% { opacity:0; transform:scale(0); }
    }

    /* ── SAW — 3-D perspective, cutting from the side ────
       The saw blade is rotated ~50° on Y axis so it
       disappears "into" the board and looks like it cuts
       from the viewer's right side into the wood.
    ──────────────────────────────────────────────────────── */
    .saw-scene {
      position: absolute;
      bottom: 72px;              /* blade at board top level */
      left: -10px;
      perspective: 500px;
      z-index: 1;
    }
    .saw-wrap {
      transform-origin: right center;
      transform: rotateY(52deg);  /* blade goes "into" board */
      animation: saw-push 2.0s ease-in-out infinite;
    }
    @keyframes saw-push {
      0%   { transform: rotateY(52deg) translateZ( 0px); }
      38%  { transform: rotateY(52deg) translateZ(-55px); }
      40%  { transform: rotateY(52deg) translateZ(-58px); }
      78%  { transform: rotateY(52deg) translateZ( 4px); }
      80%  { transform: rotateY(52deg) translateZ( 0px); }
      100% { transform: rotateY(52deg) translateZ( 0px); }
    }

    /* sawdust */
    .dust-origin {
      position: absolute;
      bottom: 108px;
      left: 155px;
      width:0; height:0;
      z-index: 5;
    }
    .dp {
      position: absolute;
      border-radius: 50%;
      background: #c97b2a;
      opacity: 0;
    }
    .dp:nth-child(1) { width:5px;height:5px; animation:dp 2.0s .42s ease-out infinite; --dx:12px;  --dy:-20px; }
    .dp:nth-child(2) { width:3px;height:3px; animation:dp 2.0s .48s ease-out infinite; --dx:18px;  --dy:-26px; background:#e0872a; }
    .dp:nth-child(3) { width:6px;height:6px; animation:dp 2.0s .44s ease-out infinite; --dx:-6px;  --dy:-22px; }
    .dp:nth-child(4) { width:4px;height:4px; animation:dp 2.0s .50s ease-out infinite; --dx:22px;  --dy:-14px; background:#b06018; }
    .dp:nth-child(5) { width:3px;height:3px; animation:dp 2.0s .45s ease-out infinite; --dx:-12px; --dy:-18px; }
    .dp:nth-child(6) { width:5px;height:5px; animation:dp 2.0s .52s ease-out infinite; --dx:8px;   --dy:-30px; background:#d07822; }
    @keyframes dp {
      0%  { opacity:0; transform:translate(0,0) scale(1); }
      8%  { opacity:1; }
      55% { opacity:.7; transform:translate(var(--dx),var(--dy)) scale(.6); }
      100%{ opacity:0; transform:translate(calc(var(--dx)*.9),calc(var(--dy)*1.8+16px)) scale(.2); }
    }

    /* ══════════════════════════════════════════════════════
       LOGIN CARD
    ══════════════════════════════════════════════════════ */
    .card {
      width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px 40px;
      box-shadow:
        0 0 0 1px rgba(79,140,255,.06),
        0 28px 80px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.05);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .card::before {
      content:'';
      position:absolute;
      top:-100px; right:-100px;
      width:300px; height:300px;
      background:radial-gradient(circle, rgba(79,140,255,.12), transparent 70%);
      pointer-events:none;
    }

    .brand { display:flex; align-items:center; gap:16px; margin-bottom:36px; }
    .brand-icon {
      width:56px; height:56px;
      border-radius:17px;
      background:linear-gradient(135deg,#3a6bef,#6cb7ff);
      display:flex; align-items:center; justify-content:center;
      font-size:24px; font-weight:900; color:#fff;
      box-shadow:0 8px 28px rgba(79,140,255,.4);
      flex-shrink:0;
    }
    .brand-name { font-size:26px; font-weight:900; letter-spacing:-.5px; line-height:1; }
    .brand-name em { font-style:normal; color:var(--accent); }
    .brand-tag { margin-top:5px; font-size:13px; color:var(--muted); font-weight:500; }

    .card-head { font-size:17px; font-weight:700; margin-bottom:8px; }
    .card-desc { font-size:14px; color:var(--muted); line-height:1.55; margin-bottom:32px; }

    .field { margin-bottom:20px; }
    .field label { display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:8px; }
    .field input {
      width:100%; padding:14px 18px;
      background:var(--s2);
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px; color:var(--text);
      font:inherit; font-size:15px; outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(79,140,255,.2);
    }

    .btn-submit {
      width:100%; margin-top:28px; padding:16px 18px;
      background:linear-gradient(135deg,#4f8cff 0%,#6ea8ff 100%);
      border:0; border-radius:16px; color:#fff;
      font:inherit; font-size:15px; font-weight:700;
      cursor:pointer; letter-spacing:.01em;
      box-shadow:0 8px 28px rgba(79,140,255,.32);
      transition:opacity .18s, transform .14s, box-shadow .18s;
    }
    .btn-submit:hover  { opacity:.91; transform:translateY(-1px); box-shadow:0 14px 36px rgba(79,140,255,.42); }
    .btn-submit:active { transform:translateY(0); opacity:1; }

    .err {
      margin-top:18px; padding:14px 18px;
      border:1px solid rgba(251,113,133,.28);
      border-radius:14px;
      background:rgba(251,113,133,.11);
      color:#fecdd3; font-size:14px; line-height:1.45;
    }
  </style>
</head>
<body>
  <div class="blob blob-blue"></div>
  <div class="blob blob-amber"></div>

  <div class="wrap">

    <!-- ═══════════ SCENE ═══════════ -->
    <div class="scene-col">

      <!-- board -->
      <div class="board"></div>

      <!-- sawdust at cut point -->
      <div class="dust-origin">
        <div class="dp"></div><div class="dp"></div><div class="dp"></div>
        <div class="dp"></div><div class="dp"></div><div class="dp"></div>
      </div>

      <!-- SAW — 3D perspective (blade enters scene from left) -->
      <div class="saw-scene">
        <div class="saw-wrap">
          <svg width="220" height="46" viewBox="0 0 220 46" fill="none" overflow="visible">
            <!-- BLADE body — tapers from handle to tip -->
            <path d="M0 8 L170 8 L176 22 L170 36 L0 36 Z" fill="#b8b8c8"/>
            <!-- top sheen -->
            <rect x="0" y="8" width="170" height="7" rx="0" fill="#d0d0e0"/>
            <!-- bevel line -->
            <line x1="2" y1="15" x2="168" y2="15" stroke="rgba(255,255,255,.22)" stroke-width="1.2"/>
            <!-- blade tip — sharp point -->
            <path d="M170 8 L220 22 L170 36 Z" fill="#c8c8d8"/>
            <!-- TEETH on bottom edge — sharp & aggressive -->
            <path d="
              M4 36 L8 46 L12 36
              L16 46 L20 36
              L24 46 L28 36
              L32 46 L36 36
              L40 46 L44 36
              L48 46 L52 36
              L56 46 L60 36
              L64 46 L68 36
              L72 46 L76 36
              L80 46 L84 36
              L88 46 L92 36
              L96 46 L100 36
              L104 46 L108 36
              L112 46 L116 36
              L120 46 L124 36
              L128 46 L132 36
              L136 46 L140 36
              L144 46 L148 36
              L152 46 L156 36
              L160 46 L164 36"
              fill="#a8a8b8" stroke="#808090" stroke-width=".6" stroke-linejoin="miter"/>
            <!-- HANDLE — pistol grip, attached right -->
            <path d="M-4 12 Q-16 8 -24 14 L-26 28 Q-24 38 -14 38 L-4 36 Z" fill="#7a4a1f"/>
            <path d="M-4 14 Q-14 11 -20 16 L-22 27 Q-20 34 -12 34 L-4 32 Z" fill="#9b6030"/>
            <!-- grip lines on handle -->
            <line x1="-18" y1="20" x2="-10" y2="18" stroke="rgba(0,0,0,.25)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="-20" y1="26" x2="-11" y2="24" stroke="rgba(0,0,0,.2)" stroke-width="1.5" stroke-linecap="round"/>
            <!-- rivet -->
            <circle cx="-8" cy="22" r="3.5" fill="#b8902a" stroke="#906810" stroke-width=".8"/>
            <circle cx="-8" cy="22" r="1.8" fill="#ddb840"/>
          </svg>
        </div>
      </div>

      <!-- HAMMER — proper T-shape, pivot at grip top ── -->
      <div class="hammer-group">
        <svg width="76" height="200" viewBox="0 0 76 200" fill="none" overflow="visible">
          <!-- GRIP / handle — wood, runs top to bottom of SVG -->
          <!-- handle shaft -->
          <rect x="31" y="0" width="14" height="165" rx="7" fill="#7a4a1f"/>
          <rect x="33" y="2" width="10" height="161" rx="5" fill="#9b6030"/>
          <!-- grip tape bands -->
          <rect x="31" y="120" width="14" height="5" rx="2" fill="rgba(0,0,0,.18)"/>
          <rect x="31" y="132" width="14" height="5" rx="2" fill="rgba(0,0,0,.18)"/>
          <rect x="31" y="144" width="14" height="5" rx="2" fill="rgba(0,0,0,.18)"/>
          <!-- handle highlight -->
          <rect x="34" y="4" width="4" height="155" rx="2" fill="rgba(255,255,255,.12)"/>

          <!-- HEAD — classic claw hammer T-shape ── -->
          <!-- main head body (horizontal bar of the T) -->
          <rect x="4" y="144" width="68" height="46" rx="7" fill="#555568"/>
          <!-- top face sheen -->
          <rect x="6" y="146" width="64" height="10" rx="5" fill="#686880"/>
          <!-- striking FACE — bottom face, center band -->
          <rect x="18" y="186" width="40" height="5" rx="2" fill="#888898"/>
          <!-- face highlight -->
          <rect x="20" y="186" width="36" height="2" rx="1" fill="rgba(255,255,255,.18)"/>
          <!-- side chamfer lines -->
          <line x1="6"  y1="148" x2="70" y2="148" stroke="rgba(255,255,255,.14)" stroke-width="1.5"/>
          <line x1="6"  y1="152" x2="70" y2="152" stroke="rgba(255,255,255,.07)" stroke-width="1"/>

          <!-- CLAW — on the top-back of head -->
          <path d="M8 144 Q2 132 6 122 Q10 114 16 118" stroke="#555568" stroke-width="8" fill="none" stroke-linecap="round"/>
          <path d="M8 144 Q3 134 7 126 Q11 120 16 122" stroke="#686880" stroke-width="4" fill="none" stroke-linecap="round"/>

          <!-- head-handle junction reinforcement ring -->
          <rect x="28" y="140" width="20" height="10" rx="3" fill="#606075"/>
          <rect x="29" y="141" width="18" height="4" rx="2" fill="rgba(255,255,255,.1)"/>
        </svg>
      </div>

      <!-- nail (ON the board) -->
      <div class="nail"></div>

      <!-- impact flash -->
      <div class="flash"></div>

      <!-- sparks -->
      <div class="sparks">
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
      </div>

    </div><!-- /scene-col -->

    <!-- ═══════════ CARD ═══════════ -->
    <form class="card" method="post" autocomplete="on">

      <div class="brand">
        <div class="brand-icon">D</div>
        <div>
          <div class="brand-name">Domo<em>stav</em></div>
          <div class="brand-tag">Analytická platforma</div>
        </div>
      </div>

      <div class="card-head">Přihlásit se</div>
      <p class="card-desc">Podle vaší role uvidíte jen moduly, ke kterým máte přístup.</p>

      <div class="field">
        <label for="username">Uživatelské jméno</label>
        <input id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Heslo</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>

      <button class="btn-submit" type="submit">Přihlásit se</button>

      {% if error %}
        <div class="err">{{ error }}</div>
      {% endif %}

    </form>
  </div>
</body>
</html>
