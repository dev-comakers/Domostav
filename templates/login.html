<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #080c14;
      --surface:  #0f1623;
      --s2:       #161e2e;
      --border:   rgba(255,255,255,.08);
      --text:     #eef2fb;
      --muted:    #8a94ae;
      --accent:   #4f8cff;
      --amber:    #f59e0b;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ambient glows ─────────────────────────────── */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(100px);
      z-index: 0;
    }
    .blob-blue  { width:600px;height:600px;top:-200px;left:-150px;background:rgba(79,140,255,.07); }
    .blob-amber { width:500px;height:500px;bottom:-180px;right:-80px;background:rgba(245,158,11,.06); }

    /* ── layout ────────────────────────────────────── */
    .wrap {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 56px;
      padding: 24px;
    }
    @media (max-width: 860px) {
      .wrap { flex-direction: column; gap: 32px; }
      .scene-col { display: none; }
    }

    /* ════════════════════════════════════════════════
       SCENE — strict bounding box, nothing escapes
    ════════════════════════════════════════════════ */
    .scene-col {
      width: 340px;
      height: 420px;
      position: relative;
      overflow: hidden;          /* clip everything */
      flex-shrink: 0;
      border-radius: 20px;
    }

    /* ── BOARD ───────────────────────────────────── */
    /* board top surface at scene_y = 420 - 80 - 30 = 310 */
    .board {
      position: absolute;
      bottom: 80px;
      left: 30px;
      width: 280px;
      height: 30px;
      background: linear-gradient(180deg, #d4842a 0%, #a85d18 55%, #7c420e 100%);
      border-radius: 4px;
      box-shadow: 0 10px 28px rgba(0,0,0,.55), inset 0 2px 0 rgba(255,255,255,.14);
      z-index: 2;
    }
    .board::after {                                  /* wood grain */
      content:'';
      position:absolute;
      inset:0;
      border-radius:inherit;
      background: repeating-linear-gradient(90deg,
        transparent 0, transparent 22px,
        rgba(0,0,0,.07) 22px, rgba(0,0,0,.07) 24px);
    }
    .board::before {                                  /* board side */
      content:'';
      position:absolute;
      top:100%; left:2px; right:2px;
      height:8px;
      background: linear-gradient(180deg, #5a300a, transparent);
      border-radius:0 0 4px 4px;
    }

    /* small notch where saw is cutting */
    .cut-notch {
      position: absolute;
      bottom: 110px;          /* on board top */
      left: 95px;
      width: 4px;
      height: 0;
      background: var(--bg);
      border-radius: 1px;
      z-index: 3;
      animation: notch 1.8s 0.4s ease-out infinite;
    }
    @keyframes notch {
      0%,100% { height: 0; }
      50%     { height: 8px; }
    }

    /* ── NAIL on top of board ─────────────────────── */
    /* nail base on board top: bottom=80+30=110; head top scene_y=420-(110+28)=282 */
    .nail {
      position: absolute;
      bottom: 110px;
      left: 197px;             /* x-center ≈ 200 */
      width: 6px;
      height: 28px;
      background: linear-gradient(180deg, #d8d8d8, #999);
      border-radius: 2px 2px 3px 3px;
      z-index: 3;
      animation: nail-sink 1.4s cubic-bezier(.4,0,.2,1) infinite;
    }
    .nail::before {            /* nail head cap */
      content: '';
      position: absolute;
      top: -6px; left: -5px;
      width: 16px; height: 7px;
      background: linear-gradient(135deg, #c8c8c8, #909090);
      border-radius: 3px;
      box-shadow: 0 1px 2px rgba(0,0,0,.4);
    }
    @keyframes nail-sink {
      0%,38%  { height: 28px; }
      52%,60% { height: 14px; }
      100%    { height: 28px; }
    }

    /* ════════════════════════════════════════════════
       HAMMER — VERTICAL, hits TOP-DOWN on nail
       Pivot: top-center of SVG (held at top of handle)
       SVG 60x140 — handle vertical, head at BOTTOM
       Pivot scene position = (200, 142)
       At rotate(0): head bottom-center at scene (200, 282) = NAIL HEAD ✓
    ════════════════════════════════════════════════ */
    .hammer {
      position: absolute;
      width: 60px;
      height: 140px;
      left: 170px;             /* 200 - 30 (half SVG width) */
      top: 142px;
      transform-origin: 50% 0%;  /* pivot = top-center of SVG */
      animation: hammer-strike 1.4s cubic-bezier(.55,.05,.3,1) infinite;
      z-index: 5;
    }
    /* Animation:
       rotate(0)    = head straight DOWN, hits nail
       rotate(+95)  = head up-and-LEFT (raised back-swing)
       rotate(-15)  = head slightly past vertical to right (bounce)
    */
    @keyframes hammer-strike {
      0%, 32%  { transform: rotate(95deg); }      /* RAISED — head up-left */
      48%      { transform: rotate(0deg); }        /* STRIKE — head straight down */
      52%      { transform: rotate(-8deg); }       /* tiny dwell past vertical */
      62%      { transform: rotate(35deg); }       /* small recoil */
      100%     { transform: rotate(95deg); }       /* back to raised */
    }

    /* ── SPARKS at nail head ─────────────────────── */
    /* nail head is at scene (200, 282) */
    .sparks {
      position: absolute;
      left: 200px;
      top: 282px;
      width: 0; height: 0;
      z-index: 6;
      pointer-events: none;
    }
    .sp {
      position: absolute;
      border-radius: 50%;
      background: var(--amber);
      opacity: 0;
    }
    .sp:nth-child(1)  { width:4px;height:4px; animation:sp 1.4s .48s ease-out infinite; --dx:18px;  --dy:-22px; }
    .sp:nth-child(2)  { width:3px;height:3px; animation:sp 1.4s .50s ease-out infinite; --dx:-16px; --dy:-26px; background:#fcd34d; }
    .sp:nth-child(3)  { width:5px;height:5px; animation:sp 1.4s .47s ease-out infinite; --dx:26px;  --dy:-14px; background:#fbbf24; }
    .sp:nth-child(4)  { width:3px;height:3px; animation:sp 1.4s .52s ease-out infinite; --dx:-10px; --dy:-32px; background:#fef3c7; }
    .sp:nth-child(5)  { width:4px;height:4px; animation:sp 1.4s .49s ease-out infinite; --dx:12px;  --dy:-30px; }
    .sp:nth-child(6)  { width:2px;height:2px; animation:sp 1.4s .51s ease-out infinite; --dx:-24px; --dy:-20px; background:#fde68a; }
    .sp:nth-child(7)  { width:5px;height:5px; animation:sp 1.4s .48s ease-out infinite; --dx:30px;  --dy:-10px; }
    .sp:nth-child(8)  { width:3px;height:3px; animation:sp 1.4s .47s ease-out infinite; --dx:-28px; --dy:-14px; background:#fcd34d; }
    .sp:nth-child(9)  { width:4px;height:4px; animation:sp 1.4s .53s ease-out infinite; --dx:8px;   --dy:-36px; }
    .sp:nth-child(10) { width:2px;height:2px; animation:sp 1.4s .50s ease-out infinite; --dx:22px;  --dy:-28px; background:#fef9c3; }
    .sp:nth-child(11) { width:5px;height:5px; animation:sp 1.4s .46s ease-out infinite; --dx:-14px; --dy:-30px; }
    .sp:nth-child(12) { width:3px;height:3px; animation:sp 1.4s .52s ease-out infinite; --dx:-32px; --dy:-22px; background:#fbbf24; }
    .sp:nth-child(13) { width:4px;height:4px; animation:sp 1.4s .49s ease-out infinite; --dx:32px;  --dy:-22px; }
    .sp:nth-child(14) { width:2px;height:2px; animation:sp 1.4s .48s ease-out infinite; --dx:14px;  --dy:-38px; background:#fef3c7; }
    @keyframes sp {
      0%   { opacity:0; transform:translate(0,0) scale(1); }
      4%   { opacity:1; }
      45%  { opacity:.9; transform:translate(var(--dx),var(--dy)) scale(.65); }
      100% { opacity:0; transform:translate(calc(var(--dx)*.8),calc(var(--dy)*1.9 + 18px)) scale(.15); }
    }

    /* impact flash on nail head */
    .flash {
      position: absolute;
      left: 170px; top: 252px;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(253,211,77,.6), transparent 70%);
      opacity: 0; transform: scale(0);
      animation: flash-pop 1.4s .48s ease-out infinite;
      z-index: 4;
    }
    @keyframes flash-pop {
      0%   { opacity:0; transform:scale(0); }
      4%   { opacity:1; transform:scale(1); }
      28%  { opacity:0; transform:scale(1.5); }
      100% { opacity:0; transform:scale(0); }
    }

    /* ════════════════════════════════════════════════
       SAW — REAL 3D PERSPECTIVE
       Wrapper provides perspective, inner uses rotateX
       to tilt blade so it visually cuts INTO the board
    ════════════════════════════════════════════════ */
    .saw-stage {
      position: absolute;
      bottom: 86px;            /* blade at board top */
      left: 0;
      width: 220px;
      height: 80px;
      perspective: 800px;
      perspective-origin: 50% 100%;
      z-index: 1;
    }
    .saw-3d {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: saw-stroke 1.9s ease-in-out infinite;
    }
    /* rotateX(50): top edge tilts AWAY from viewer (3D depth)
       rotateZ(-7): slight angle, like saw is being pushed in
       translateX/Z: animation back-and-forth */
    @keyframes saw-stroke {
      0%   { transform: rotateX(50deg) rotateZ(-7deg) translateX(0); }
      45%  { transform: rotateX(50deg) rotateZ(-7deg) translateX(46px); }
      55%  { transform: rotateX(50deg) rotateZ(-7deg) translateX(46px); }
      100% { transform: rotateX(50deg) rotateZ(-7deg) translateX(0); }
    }
    .saw-svg { width: 100%; height: 100%; display: block; overflow: visible; }

    /* sawdust at cut point: scene (95, 305) */
    .dust {
      position: absolute;
      left: 95px; top: 305px;
      width: 0; height: 0;
      z-index: 6;
      pointer-events: none;
    }
    .dp {
      position: absolute;
      border-radius: 50%;
      background: #c97b2a;
      opacity: 0;
    }
    .dp:nth-child(1) { width:5px;height:5px; animation:dp 1.9s .35s ease-out infinite; --dx:14px;  --dy:-22px; }
    .dp:nth-child(2) { width:3px;height:3px; animation:dp 1.9s .42s ease-out infinite; --dx:20px;  --dy:-28px; background:#e0872a; }
    .dp:nth-child(3) { width:6px;height:6px; animation:dp 1.9s .38s ease-out infinite; --dx:-6px;  --dy:-24px; }
    .dp:nth-child(4) { width:4px;height:4px; animation:dp 1.9s .44s ease-out infinite; --dx:24px;  --dy:-14px; background:#b06018; }
    .dp:nth-child(5) { width:3px;height:3px; animation:dp 1.9s .40s ease-out infinite; --dx:-12px; --dy:-18px; }
    .dp:nth-child(6) { width:5px;height:5px; animation:dp 1.9s .46s ease-out infinite; --dx:8px;   --dy:-32px; background:#d07822; }
    .dp:nth-child(7) { width:3px;height:3px; animation:dp 1.9s .39s ease-out infinite; --dx:-18px; --dy:-22px; }
    @keyframes dp {
      0%  { opacity:0; transform:translate(0,0) scale(1); }
      8%  { opacity:1; }
      55% { opacity:.7; transform:translate(var(--dx),var(--dy)) scale(.6); }
      100%{ opacity:0; transform:translate(calc(var(--dx)*.9),calc(var(--dy)*1.8+16px)) scale(.2); }
    }

    /* ════════════════════════════════════════════════
       LOGIN CARD
    ════════════════════════════════════════════════ */
    .card {
      width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px 40px;
      box-shadow:
        0 0 0 1px rgba(79,140,255,.06),
        0 28px 80px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.05);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .card::before {
      content:''; position:absolute;
      top:-100px; right:-100px;
      width:300px; height:300px;
      background:radial-gradient(circle, rgba(79,140,255,.12), transparent 70%);
      pointer-events:none;
    }

    .brand { display:flex; align-items:center; gap:16px; margin-bottom:36px; }
    .brand-icon {
      width:56px; height:56px;
      border-radius:17px;
      background:linear-gradient(135deg,#3a6bef,#6cb7ff);
      display:flex; align-items:center; justify-content:center;
      font-size:24px; font-weight:900; color:#fff;
      box-shadow:0 8px 28px rgba(79,140,255,.4);
      flex-shrink:0;
    }
    .brand-name { font-size:26px; font-weight:900; letter-spacing:-.5px; line-height:1; }
    .brand-name em { font-style:normal; color:var(--accent); }
    .brand-tag { margin-top:5px; font-size:13px; color:var(--muted); font-weight:500; }

    .card-head { font-size:17px; font-weight:700; margin-bottom:8px; }
    .card-desc { font-size:14px; color:var(--muted); line-height:1.55; margin-bottom:32px; }

    .field { margin-bottom:20px; }
    .field label { display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:8px; }
    .field input {
      width:100%; padding:14px 18px;
      background:var(--s2);
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px; color:var(--text);
      font:inherit; font-size:15px; outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(79,140,255,.2);
    }

    .btn-submit {
      width:100%; margin-top:28px; padding:16px 18px;
      background:linear-gradient(135deg,#4f8cff 0%,#6ea8ff 100%);
      border:0; border-radius:16px; color:#fff;
      font:inherit; font-size:15px; font-weight:700;
      cursor:pointer; letter-spacing:.01em;
      box-shadow:0 8px 28px rgba(79,140,255,.32);
      transition:opacity .18s, transform .14s, box-shadow .18s;
    }
    .btn-submit:hover  { opacity:.91; transform:translateY(-1px); box-shadow:0 14px 36px rgba(79,140,255,.42); }
    .btn-submit:active { transform:translateY(0); opacity:1; }

    .err {
      margin-top:18px; padding:14px 18px;
      border:1px solid rgba(251,113,133,.28);
      border-radius:14px;
      background:rgba(251,113,133,.11);
      color:#fecdd3; font-size:14px; line-height:1.45;
    }
  </style>
</head>
<body>
  <div class="blob blob-blue"></div>
  <div class="blob blob-amber"></div>

  <div class="wrap">

    <!-- ═══════════ SCENE ═══════════ -->
    <div class="scene-col">

      <!-- board (the wood being worked) -->
      <div class="board"></div>
      <div class="cut-notch"></div>

      <!-- SAW with REAL 3D PERSPECTIVE TRANSFORM -->
      <div class="saw-stage">
        <div class="saw-3d">
          <svg class="saw-svg" viewBox="0 0 240 80" fill="none">
            <defs>
              <linearGradient id="bladeGrad" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0"   stop-color="#dcdce8"/>
                <stop offset=".5"  stop-color="#b8b8c8"/>
                <stop offset="1"   stop-color="#8e8ea0"/>
              </linearGradient>
              <linearGradient id="handleGrad" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0" stop-color="#a06030"/>
                <stop offset="1" stop-color="#5a3210"/>
              </linearGradient>
            </defs>

            <!-- BLADE main body — tapers toward tip -->
            <path d="M 8 22 L 178 28 L 184 38 L 184 48 L 178 52 L 8 50 Z"
                  fill="url(#bladeGrad)" stroke="#666678" stroke-width=".5"/>
            <!-- top sheen on blade -->
            <path d="M 8 22 L 178 28 L 178 32 L 8 26 Z" fill="rgba(255,255,255,.32)"/>
            <!-- bevel mid-line -->
            <line x1="10" y1="36" x2="180" y2="40" stroke="rgba(255,255,255,.18)" stroke-width="1"/>

            <!-- TEETH on bottom edge — sharp triangles -->
            <path d="
              M 10 50 L 14 60 L 18 50
              L 22 60 L 26 50
              L 30 60 L 34 50
              L 38 60 L 42 50
              L 46 60 L 50 50
              L 54 60 L 58 50
              L 62 60 L 66 50
              L 70 60 L 74 50
              L 78 60 L 82 50
              L 86 60 L 90 50
              L 94 60 L 98 50
              L 102 60 L 106 50
              L 110 60 L 114 50
              L 118 60 L 122 50
              L 126 60 L 130 50
              L 134 60 L 138 50
              L 142 60 L 146 50
              L 150 60 L 154 50
              L 158 60 L 162 50
              L 166 60 L 170 50
              L 174 60 L 178 51"
              fill="#909098" stroke="#5e5e6c" stroke-width=".7" stroke-linejoin="miter"/>

            <!-- HANDLE — pistol grip on right (3D-ish) -->
            <path d="M 178 18 Q 210 16 218 30 L 224 46 Q 222 62 208 66 L 192 66 Q 180 64 178 52 L 178 36 Z"
                  fill="url(#handleGrad)" stroke="#3a2008" stroke-width="1"/>
            <!-- inner hole (where hand goes) -->
            <path d="M 192 28 Q 208 28 210 40 Q 210 52 198 56 Q 188 54 188 44 Q 188 32 192 28 Z"
                  fill="#080c14"/>
            <!-- handle highlight -->
            <path d="M 184 22 Q 200 20 206 28 L 208 32 Q 198 28 188 32 Z"
                  fill="rgba(255,255,255,.18)"/>
            <!-- rivets -->
            <circle cx="186" cy="34" r="2.5" fill="#c8a040" stroke="#806020" stroke-width=".7"/>
            <circle cx="186" cy="34" r="1.2" fill="#f0d070"/>
            <circle cx="200" cy="60" r="2.5" fill="#c8a040" stroke="#806020" stroke-width=".7"/>
            <circle cx="200" cy="60" r="1.2" fill="#f0d070"/>
          </svg>
        </div>
      </div>

      <!-- sawdust at cut point -->
      <div class="dust">
        <div class="dp"></div><div class="dp"></div><div class="dp"></div>
        <div class="dp"></div><div class="dp"></div><div class="dp"></div>
        <div class="dp"></div>
      </div>

      <!-- HAMMER — vertical, hits TOP-DOWN on nail -->
      <div class="hammer">
        <svg viewBox="0 0 60 140" fill="none">
          <defs>
            <linearGradient id="handleGradH" x1="0" x2="1" y1="0" y2="0">
              <stop offset="0"   stop-color="#5a3210"/>
              <stop offset=".5"  stop-color="#9b6030"/>
              <stop offset="1"   stop-color="#5a3210"/>
            </linearGradient>
            <linearGradient id="headGrad" x1="0" x2="1" y1="0" y2="0">
              <stop offset="0"  stop-color="#3e3e50"/>
              <stop offset=".5" stop-color="#6e6e84"/>
              <stop offset="1"  stop-color="#3e3e50"/>
            </linearGradient>
          </defs>

          <!-- HANDLE — vertical wooden grip (top to head) -->
          <rect x="24" y="0" width="12" height="100" rx="6" fill="url(#handleGradH)"/>
          <!-- grip wraps -->
          <rect x="24" y="74" width="12" height="4" rx="2" fill="rgba(0,0,0,.28)"/>
          <rect x="24" y="82" width="12" height="4" rx="2" fill="rgba(0,0,0,.28)"/>
          <rect x="24" y="90" width="12" height="4" rx="2" fill="rgba(0,0,0,.28)"/>
          <!-- handle highlight stripe -->
          <rect x="27" y="2" width="2.5" height="96" rx="1" fill="rgba(255,255,255,.14)"/>

          <!-- HEAD-HANDLE COLLAR -->
          <rect x="20" y="96" width="20" height="10" rx="2" fill="#4a4a5e"/>
          <rect x="21" y="97" width="18" height="3" rx="1" fill="rgba(255,255,255,.12)"/>

          <!-- HEAD — classic claw hammer T-shape (horizontal at bottom) -->
          <rect x="3" y="100" width="54" height="38" rx="6" fill="url(#headGrad)"/>
          <!-- top sheen of head -->
          <rect x="5" y="102" width="50" height="8" rx="3" fill="rgba(255,255,255,.16)"/>
          <!-- chamfer line -->
          <line x1="6" y1="112" x2="54" y2="112" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
          <!-- striking face indent -->
          <rect x="22" y="134" width="16" height="4" rx="2" fill="#252535"/>
          <!-- small face highlight -->
          <rect x="24" y="135" width="12" height="1.5" rx=".7" fill="rgba(255,255,255,.2)"/>

          <!-- CLAW — on the left of head, pointing back-up -->
          <path d="M 5 102 Q -4 92 0 80 Q 4 72 12 78"
                stroke="#3e3e50" stroke-width="6" fill="none" stroke-linecap="round"/>
          <path d="M 5 102 Q -2 94 2 84 Q 6 78 11 82"
                stroke="#6e6e84" stroke-width="3" fill="none" stroke-linecap="round"/>
          <!-- claw split -->
          <path d="M 1 86 L 3 92" stroke="#1a1a26" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- nail (ON board) -->
      <div class="nail"></div>

      <!-- impact flash + sparks -->
      <div class="flash"></div>
      <div class="sparks">
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div>
      </div>

    </div><!-- /scene-col -->

    <!-- ═══════════ CARD ═══════════ -->
    <form class="card" method="post" autocomplete="on">

      <div class="brand">
        <div class="brand-icon">D</div>
        <div>
          <div class="brand-name">Domo<em>stav</em></div>
          <div class="brand-tag">Analytická platforma</div>
        </div>
      </div>

      <div class="card-head">Přihlásit se</div>
      <p class="card-desc">Podle vaší role uvidíte jen moduly, ke kterým máte přístup.</p>

      <div class="field">
        <label for="username">Uživatelské jméno</label>
        <input id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Heslo</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>

      <button class="btn-submit" type="submit">Přihlásit se</button>

      {% if error %}
        <div class="err">{{ error }}</div>
      {% endif %}

    </form>
  </div>
</body>
</html>
