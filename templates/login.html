<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #080c14;
      --surface:  #0f1623;
      --s2:       #161e2e;
      --border:   rgba(255,255,255,.08);
      --text:     #eef2fb;
      --muted:    #8a94ae;
      --accent:   #4f8cff;
      --amber:    #f59e0b;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ambient glows ─────────────────────────────── */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(100px);
      z-index: 0;
    }
    .blob-blue  { width:600px;height:600px;top:-200px;left:-150px;background:rgba(79,140,255,.07); }
    .blob-amber { width:500px;height:500px;bottom:-180px;right:-80px;background:rgba(245,158,11,.06); }

    /* ── layout ────────────────────────────────────── */
    .wrap {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 56px;
      padding: 24px;
    }
    @media (max-width: 860px) {
      .wrap { flex-direction: column; gap: 32px; }
      .scene-col { display: none; }
    }

    /* ════════════════════════════════════════════════
       SCENE — strict bounding box, nothing escapes
    ════════════════════════════════════════════════ */
    .scene-col {
      width: 340px;
      height: 420px;
      position: relative;
      overflow: hidden;          /* clip everything */
      flex-shrink: 0;
      border-radius: 20px;
    }

    /* ── BOARD ───────────────────────────────────── */
    /* board top surface at scene_y = 420 - 80 - 30 = 310 */
    .board {
      position: absolute;
      bottom: 80px;
      left: 30px;
      width: 280px;
      height: 30px;
      background: linear-gradient(180deg, #d4842a 0%, #a85d18 55%, #7c420e 100%);
      border-radius: 4px;
      box-shadow: 0 10px 28px rgba(0,0,0,.55), inset 0 2px 0 rgba(255,255,255,.14);
      z-index: 2;
    }
    .board::after {                                  /* wood grain */
      content:'';
      position:absolute;
      inset:0;
      border-radius:inherit;
      background: repeating-linear-gradient(90deg,
        transparent 0, transparent 22px,
        rgba(0,0,0,.07) 22px, rgba(0,0,0,.07) 24px);
    }
    .board::before {                                  /* board side */
      content:'';
      position:absolute;
      top:100%; left:2px; right:2px;
      height:8px;
      background: linear-gradient(180deg, #5a300a, transparent);
      border-radius:0 0 4px 4px;
    }

    /* ── NAIL on top of board ─────────────────────── */
    /* board: left 30, width 280 → center x = 170
       nail base on board top: bottom=80+30=110          */
    .nail {
      position: absolute;
      bottom: 110px;
      left: 167px;             /* center at 170 = board center */
      width: 6px;
      height: 28px;
      background: linear-gradient(180deg, #d8d8d8, #999);
      border-radius: 2px 2px 3px 3px;
      z-index: 3;
      animation: nail-sink 1.4s cubic-bezier(.4,0,.2,1) infinite;
    }
    .nail::before {            /* nail head cap */
      content: '';
      position: absolute;
      top: -6px; left: -5px;
      width: 16px; height: 7px;
      background: linear-gradient(135deg, #c8c8c8, #909090);
      border-radius: 3px;
      box-shadow: 0 1px 2px rgba(0,0,0,.4);
    }
    @keyframes nail-sink {
      0%,38%  { height: 28px; }
      52%,60% { height: 14px; }
      100%    { height: 28px; }
    }

    /* ════════════════════════════════════════════════
       HAMMER — VERTICAL, hits TOP-DOWN on nail
       Pivot: top-center of SVG = scene x:170, y:142
       At rotate(0): head bottom-center ≈ scene (170, 282) = NAIL HEAD ✓
    ════════════════════════════════════════════════ */
    .hammer {
      position: absolute;
      width: 60px;
      height: 140px;
      left: 140px;             /* 170 - 30 (half SVG 60px) */
      top: 142px;
      transform-origin: 50% 0%;  /* pivot = top-center of SVG */
      animation: hammer-strike 1.4s cubic-bezier(.55,.05,.3,1) infinite;
      z-index: 5;
    }
    /* Animation:
       rotate(0)    = head straight DOWN, hits nail
       rotate(+95)  = head up-and-LEFT (raised back-swing)
       rotate(-15)  = head slightly past vertical to right (bounce)
    */
    @keyframes hammer-strike {
      0%, 32%  { transform: rotate(95deg); }      /* RAISED — head up-left */
      48%      { transform: rotate(0deg); }        /* STRIKE — head straight down */
      52%      { transform: rotate(-8deg); }       /* tiny dwell past vertical */
      62%      { transform: rotate(35deg); }       /* small recoil */
      100%     { transform: rotate(95deg); }       /* back to raised */
    }

    /* ── SPARKS at nail head ─────────────────────── */
    /* nail head is at scene (170, 282) */
    .sparks {
      position: absolute;
      left: 170px;
      top: 282px;
      width: 0; height: 0;
      z-index: 6;
      pointer-events: none;
    }
    .sp {
      position: absolute;
      border-radius: 50%;
      background: var(--amber);
      opacity: 0;
    }
    .sp:nth-child(1)  { width:4px;height:4px; animation:sp 1.4s .48s ease-out infinite; --dx:18px;  --dy:-22px; }
    .sp:nth-child(2)  { width:3px;height:3px; animation:sp 1.4s .50s ease-out infinite; --dx:-16px; --dy:-26px; background:#fcd34d; }
    .sp:nth-child(3)  { width:5px;height:5px; animation:sp 1.4s .47s ease-out infinite; --dx:26px;  --dy:-14px; background:#fbbf24; }
    .sp:nth-child(4)  { width:3px;height:3px; animation:sp 1.4s .52s ease-out infinite; --dx:-10px; --dy:-32px; background:#fef3c7; }
    .sp:nth-child(5)  { width:4px;height:4px; animation:sp 1.4s .49s ease-out infinite; --dx:12px;  --dy:-30px; }
    .sp:nth-child(6)  { width:2px;height:2px; animation:sp 1.4s .51s ease-out infinite; --dx:-24px; --dy:-20px; background:#fde68a; }
    .sp:nth-child(7)  { width:5px;height:5px; animation:sp 1.4s .48s ease-out infinite; --dx:30px;  --dy:-10px; }
    .sp:nth-child(8)  { width:3px;height:3px; animation:sp 1.4s .47s ease-out infinite; --dx:-28px; --dy:-14px; background:#fcd34d; }
    .sp:nth-child(9)  { width:4px;height:4px; animation:sp 1.4s .53s ease-out infinite; --dx:8px;   --dy:-36px; }
    .sp:nth-child(10) { width:2px;height:2px; animation:sp 1.4s .50s ease-out infinite; --dx:22px;  --dy:-28px; background:#fef9c3; }
    .sp:nth-child(11) { width:5px;height:5px; animation:sp 1.4s .46s ease-out infinite; --dx:-14px; --dy:-30px; }
    .sp:nth-child(12) { width:3px;height:3px; animation:sp 1.4s .52s ease-out infinite; --dx:-32px; --dy:-22px; background:#fbbf24; }
    .sp:nth-child(13) { width:4px;height:4px; animation:sp 1.4s .49s ease-out infinite; --dx:32px;  --dy:-22px; }
    .sp:nth-child(14) { width:2px;height:2px; animation:sp 1.4s .48s ease-out infinite; --dx:14px;  --dy:-38px; background:#fef3c7; }
    @keyframes sp {
      0%   { opacity:0; transform:translate(0,0) scale(1); }
      4%   { opacity:1; }
      45%  { opacity:.9; transform:translate(var(--dx),var(--dy)) scale(.65); }
      100% { opacity:0; transform:translate(calc(var(--dx)*.8),calc(var(--dy)*1.9 + 18px)) scale(.15); }
    }

    /* impact flash on nail head */
    .flash {
      position: absolute;
      left: 140px; top: 252px;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(253,211,77,.6), transparent 70%);
      opacity: 0; transform: scale(0);
      animation: flash-pop 1.4s .48s ease-out infinite;
      z-index: 4;
    }
    @keyframes flash-pop {
      0%   { opacity:0; transform:scale(0); }
      4%   { opacity:1; transform:scale(1); }
      28%  { opacity:0; transform:scale(1.5); }
      100% { opacity:0; transform:scale(0); }
    }

    /* ════════════════════════════════════════════════
       LOGIN CARD
    ════════════════════════════════════════════════ */
    .card {
      width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px 40px;
      box-shadow:
        0 0 0 1px rgba(79,140,255,.06),
        0 28px 80px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.05);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .card::before {
      content:''; position:absolute;
      top:-100px; right:-100px;
      width:300px; height:300px;
      background:radial-gradient(circle, rgba(79,140,255,.12), transparent 70%);
      pointer-events:none;
    }

    .brand { display:flex; align-items:center; gap:16px; margin-bottom:36px; }
    .brand-icon {
      width:56px; height:56px;
      border-radius:17px;
      background:linear-gradient(135deg,#3a6bef,#6cb7ff);
      display:flex; align-items:center; justify-content:center;
      font-size:24px; font-weight:900; color:#fff;
      box-shadow:0 8px 28px rgba(79,140,255,.4);
      flex-shrink:0;
    }
    .brand-name { font-size:26px; font-weight:900; letter-spacing:-.5px; line-height:1; }
    .brand-name em { font-style:normal; color:var(--accent); }
    .brand-tag { margin-top:5px; font-size:13px; color:var(--muted); font-weight:500; }

    .card-head { font-size:17px; font-weight:700; margin-bottom:8px; }
    .card-desc { font-size:14px; color:var(--muted); line-height:1.55; margin-bottom:32px; }

    .field { margin-bottom:20px; }
    .field label { display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:8px; }
    .field input {
      width:100%; padding:14px 18px;
      background:var(--s2);
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px; color:var(--text);
      font:inherit; font-size:15px; outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(79,140,255,.2);
    }

    .btn-submit {
      width:100%; margin-top:28px; padding:16px 18px;
      background:linear-gradient(135deg,#4f8cff 0%,#6ea8ff 100%);
      border:0; border-radius:16px; color:#fff;
      font:inherit; font-size:15px; font-weight:700;
      cursor:pointer; letter-spacing:.01em;
      box-shadow:0 8px 28px rgba(79,140,255,.32);
      transition:opacity .18s, transform .14s, box-shadow .18s;
    }
    .btn-submit:hover  { opacity:.91; transform:translateY(-1px); box-shadow:0 14px 36px rgba(79,140,255,.42); }
    .btn-submit:active { transform:translateY(0); opacity:1; }

    .err {
      margin-top:18px; padding:14px 18px;
      border:1px solid rgba(251,113,133,.28);
      border-radius:14px;
      background:rgba(251,113,133,.11);
      color:#fecdd3; font-size:14px; line-height:1.45;
    }
  </style>
</head>
<body>
  <div class="blob blob-blue"></div>
  <div class="blob blob-amber"></div>

  <div class="wrap">

    <!-- ═══════════ SCENE ═══════════ -->
    <div class="scene-col">

      <!-- board -->
      <div class="board"></div>

      <!-- HAMMER — vertical, hits TOP-DOWN on nail -->
      <div class="hammer">
        <svg viewBox="0 0 60 140" fill="none">
          <defs>
            <linearGradient id="handleGradH" x1="0" x2="1" y1="0" y2="0">
              <stop offset="0"   stop-color="#5a3210"/>
              <stop offset=".5"  stop-color="#9b6030"/>
              <stop offset="1"   stop-color="#5a3210"/>
            </linearGradient>
            <linearGradient id="headGrad" x1="0" x2="1" y1="0" y2="0">
              <stop offset="0"  stop-color="#3e3e50"/>
              <stop offset=".5" stop-color="#6e6e84"/>
              <stop offset="1"  stop-color="#3e3e50"/>
            </linearGradient>
          </defs>

          <!-- HANDLE — vertical wooden grip (top to head) -->
          <rect x="24" y="0" width="12" height="100" rx="6" fill="url(#handleGradH)"/>
          <!-- grip wraps -->
          <rect x="24" y="74" width="12" height="4" rx="2" fill="rgba(0,0,0,.28)"/>
          <rect x="24" y="82" width="12" height="4" rx="2" fill="rgba(0,0,0,.28)"/>
          <rect x="24" y="90" width="12" height="4" rx="2" fill="rgba(0,0,0,.28)"/>
          <!-- handle highlight stripe -->
          <rect x="27" y="2" width="2.5" height="96" rx="1" fill="rgba(255,255,255,.14)"/>

          <!-- HEAD-HANDLE COLLAR -->
          <rect x="20" y="96" width="20" height="10" rx="2" fill="#4a4a5e"/>
          <rect x="21" y="97" width="18" height="3" rx="1" fill="rgba(255,255,255,.12)"/>

          <!-- HEAD — classic claw hammer T-shape (horizontal at bottom) -->
          <rect x="3" y="100" width="54" height="38" rx="6" fill="url(#headGrad)"/>
          <!-- top sheen of head -->
          <rect x="5" y="102" width="50" height="8" rx="3" fill="rgba(255,255,255,.16)"/>
          <!-- chamfer line -->
          <line x1="6" y1="112" x2="54" y2="112" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
          <!-- striking face indent -->
          <rect x="22" y="134" width="16" height="4" rx="2" fill="#252535"/>
          <!-- small face highlight -->
          <rect x="24" y="135" width="12" height="1.5" rx=".7" fill="rgba(255,255,255,.2)"/>

        </svg>
      </div>

      <!-- nail (ON board) -->
      <div class="nail"></div>

      <!-- impact flash + sparks -->
      <div class="flash"></div>
      <div class="sparks">
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div>
      </div>

    </div><!-- /scene-col -->

    <!-- ═══════════ CARD ═══════════ -->
    <form class="card" method="post" autocomplete="on">

      <div class="brand">
        <div class="brand-icon">D</div>
        <div>
          <div class="brand-name">Domo<em>stav</em></div>
          <div class="brand-tag">Analytická platforma</div>
        </div>
      </div>

      <div class="card-head">Přihlásit se</div>
      <p class="card-desc">Podle vaší role uvidíte jen moduly, ke kterým máte přístup.</p>

      <div class="field">
        <label for="username">Uživatelské jméno</label>
        <input id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Heslo</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>

      <button class="btn-submit" type="submit">Přihlásit se</button>

      {% if error %}
        <div class="err">{{ error }}</div>
      {% endif %}

    </form>
  </div>
</body>
</html>
