<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #080c14;
      --surface:   #0f1623;
      --surface-2: #161e2e;
      --border:    rgba(255,255,255,.08);
      --text:      #eef2fb;
      --muted:     #8a94ae;
      --accent:    #4f8cff;
      --amber:     #f59e0b;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ambient glow blobs ───────────────────────────── */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(90px);
      z-index: 0;
    }
    .blob-blue  { width:600px; height:600px; top:-180px; left:-150px; background:rgba(79,140,255,.07); }
    .blob-amber { width:500px; height:500px; bottom:-160px; right:-80px; background:rgba(245,158,11,.06); }

    /* ── two-column wrap ─────────────────────────────── */
    .wrap {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 72px;
      padding: 24px;
    }

    @media (max-width: 900px) {
      .wrap { flex-direction: column; gap: 32px; }
      .scene-col { display: none; }
    }

    /* ════════════════════════════════════════════════════
       SCENE
    ═════════════════════════════════════════════════════*/
    .scene-col {
      width: 380px;
      height: 340px;
      position: relative;
      flex-shrink: 0;
    }

    /* ── board (no backing texture) ─────────────────── */
    .board {
      position: absolute;
      bottom: 52px;
      left: 50px;
      width: 260px;
      height: 34px;
      background: linear-gradient(180deg, #c97b2a 0%, #a35f18 55%, #8b4d10 100%);
      border-radius: 4px 4px 3px 3px;
      box-shadow: 0 6px 20px rgba(0,0,0,.5);
    }

    /* wood grain — subtle horizontal lines only */
    .board::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: repeating-linear-gradient(
        180deg,
        transparent 0,
        transparent 7px,
        rgba(0,0,0,.08) 7px,
        rgba(0,0,0,.08) 8px
      );
    }

    /* growing cut slot */
    .board-cut {
      position: absolute;
      top: -1px; bottom: -1px;
      left: 118px;
      width: 0;
      background: var(--bg);
      border-radius: 1px;
      animation: cut-grow 4s 1s ease-in-out infinite;
    }
    @keyframes cut-grow {
      0%,15%  { width: 0; }
      45%,55% { width: 4px; }
      85%,100%{ width: 0; }
    }

    /* ── SAW ─────────────────────────────────────────── */
    /*  full handsaw: handle on the right, blade going left */
    .saw-wrap {
      position: absolute;
      bottom: 54px;         /* sits on top of board */
      left: 20px;
      animation: saw-slide 2.4s ease-in-out infinite;
      transform-origin: left center;
    }
    @keyframes saw-slide {
      0%   { transform: translateX(0px); }
      38%  { transform: translateX(136px); }
      40%  { transform: translateX(140px); }
      78%  { transform: translateX(4px); }
      80%  { transform: translateX(0px); }
      100% { transform: translateX(0px); }
    }

    /* sawdust bursts at cut point */
    .dust {
      position: absolute;
      bottom: 88px;
      left: 165px;          /* near cut */
      width: 0; height: 0;
      pointer-events: none;
    }
    .dust-p {
      position: absolute;
      border-radius: 50%;
      background: #c97b2a;
      opacity: 0;
    }
    .dust-p:nth-child(1)  { width:5px; height:5px; animation: dust-fly 2.4s .45s ease-out infinite; --dx:10px;  --dy:-16px; }
    .dust-p:nth-child(2)  { width:3px; height:3px; animation: dust-fly 2.4s .50s ease-out infinite; --dx:16px;  --dy:-22px; background:#e8962e; }
    .dust-p:nth-child(3)  { width:6px; height:6px; animation: dust-fly 2.4s .42s ease-out infinite; --dx:-8px;  --dy:-18px; }
    .dust-p:nth-child(4)  { width:4px; height:4px; animation: dust-fly 2.4s .48s ease-out infinite; --dx:20px;  --dy:-12px; background:#b86a1f; }
    .dust-p:nth-child(5)  { width:3px; height:3px; animation: dust-fly 2.4s .46s ease-out infinite; --dx:-14px; --dy:-14px; }
    .dust-p:nth-child(6)  { width:5px; height:5px; animation: dust-fly 2.4s .52s ease-out infinite; --dx:6px;   --dy:-26px; background:#d98224; }
    .dust-p:nth-child(7)  { width:3px; height:3px; animation: dust-fly 2.4s .44s ease-out infinite; --dx:-4px;  --dy:-20px; }
    @keyframes dust-fly {
      0%   { opacity:0; transform:translate(0,0) scale(1); }
      8%   { opacity:1; }
      55%  { opacity:.7; transform:translate(var(--dx),var(--dy)) scale(.7); }
      100% { opacity:0; transform:translate(calc(var(--dx)*.9), calc(var(--dy)*1.7 + 18px)) scale(.2); }
    }

    /* ── HAMMER ──────────────────────────────────────── */
    .hammer-wrap {
      position: absolute;
      top: 0;
      right: 18px;
      /* pivot is top-right of the handle */
      transform-origin: 88% 6%;
      animation: hammer-swing 1.4s cubic-bezier(.4,0,.2,1) infinite;
    }
    @keyframes hammer-swing {
      0%   { transform: rotate(-72deg); }
      /* slow rise back up */
      30%  { transform: rotate(-72deg); }
      /* fast strike */
      52%  { transform: rotate(28deg); }
      54%  { transform: rotate(30deg); }
      /* bounce off */
      62%  { transform: rotate(18deg); }
      /* return */
      100% { transform: rotate(-72deg); }
    }

    /* nail being driven */
    .nail {
      position: absolute;
      bottom: 50px;
      right: 68px;
      width: 6px;
      height: 22px;
      background: linear-gradient(180deg, #d0d0d0, #888);
      border-radius: 1px 1px 2px 2px;
      animation: nail-sink 1.4s cubic-bezier(.4,0,.2,1) infinite;
    }
    .nail::before {
      content: '';
      position: absolute;
      top: -5px;
      left: -4px;
      width: 14px;
      height: 7px;
      background: #b0b0b0;
      border-radius: 3px;
    }
    @keyframes nail-sink {
      0%,30%  { height: 22px; }
      52%,62% { height: 10px; }
      100%    { height: 22px; }
    }

    /* ── SPARKS (big burst) ──────────────────────────── */
    .sparks {
      position: absolute;
      bottom: 50px;
      right: 60px;
      width: 0; height: 0;
      pointer-events: none;
    }
    .sp {
      position: absolute;
      border-radius: 50%;
      background: var(--amber);
      opacity: 0;
    }
    /* 14 sparks, varied sizes and directions */
    .sp:nth-child(1)  { width:4px; height:4px; animation:spark 1.4s .52s ease-out infinite; --dx:16px;  --dy:-20px; }
    .sp:nth-child(2)  { width:3px; height:3px; animation:spark 1.4s .54s ease-out infinite; --dx:-14px; --dy:-24px; background:#fcd34d; }
    .sp:nth-child(3)  { width:5px; height:5px; animation:spark 1.4s .50s ease-out infinite; --dx:24px;  --dy:-14px; background:#fbbf24; }
    .sp:nth-child(4)  { width:3px; height:3px; animation:spark 1.4s .56s ease-out infinite; --dx:-8px;  --dy:-30px; background:#fef3c7; }
    .sp:nth-child(5)  { width:4px; height:4px; animation:spark 1.4s .51s ease-out infinite; --dx:10px;  --dy:-28px; }
    .sp:nth-child(6)  { width:2px; height:2px; animation:spark 1.4s .53s ease-out infinite; --dx:-20px; --dy:-18px; background:#fde68a; }
    .sp:nth-child(7)  { width:5px; height:5px; animation:spark 1.4s .55s ease-out infinite; --dx:28px;  --dy:-10px; background:#f59e0b; }
    .sp:nth-child(8)  { width:3px; height:3px; animation:spark 1.4s .49s ease-out infinite; --dx:-26px; --dy:-12px; background:#fcd34d; }
    .sp:nth-child(9)  { width:4px; height:4px; animation:spark 1.4s .57s ease-out infinite; --dx:6px;   --dy:-32px; }
    .sp:nth-child(10) { width:2px; height:2px; animation:spark 1.4s .52s ease-out infinite; --dx:20px;  --dy:-26px; background:#fef9c3; }
    .sp:nth-child(11) { width:5px; height:5px; animation:spark 1.4s .48s ease-out infinite; --dx:-12px; --dy:-28px; background:#f59e0b; }
    .sp:nth-child(12) { width:3px; height:3px; animation:spark 1.4s .54s ease-out infinite; --dx:32px;  --dy:-18px; background:#fbbf24; }
    .sp:nth-child(13) { width:4px; height:4px; animation:spark 1.4s .51s ease-out infinite; --dx:-30px; --dy:-22px; }
    .sp:nth-child(14) { width:2px; height:2px; animation:spark 1.4s .53s ease-out infinite; --dx:14px;  --dy:-36px; background:#fef3c7; }
    @keyframes spark {
      0%   { opacity:0; transform:translate(0,0) scale(1); }
      4%   { opacity:1; }
      45%  { opacity:.9; transform:translate(var(--dx),var(--dy)) scale(.7); }
      100% { opacity:0; transform:translate(calc(var(--dx)*.85), calc(var(--dy)*1.8 + 16px)) scale(0.2); }
    }

    /* ── impact flash ────────────────────────────────── */
    .flash {
      position: absolute;
      bottom: 38px;
      right: 40px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(253,230,138,.55), transparent 70%);
      opacity: 0;
      transform: scale(0);
      animation: flash-pop 1.4s .52s ease-out infinite;
    }
    @keyframes flash-pop {
      0%   { opacity:0; transform:scale(0); }
      5%   { opacity:1; transform:scale(1); }
      30%  { opacity:0; transform:scale(1.4); }
      100% { opacity:0; transform:scale(0); }
    }

    /* ════════════════════════════════════════════════════
       CARD
    ═════════════════════════════════════════════════════*/
    .card {
      width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px 40px;
      box-shadow:
        0 0 0 1px rgba(79,140,255,.06),
        0 28px 80px rgba(0,0,0,.5),
        inset 0 1px 0 rgba(255,255,255,.05);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(79,140,255,.12), transparent 70%);
      pointer-events: none;
    }

    /* brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 58px; height: 58px;
      border-radius: 18px;
      background: linear-gradient(135deg, #3a6bef, #6cb7ff);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 900; color: #fff;
      box-shadow: 0 8px 28px rgba(79,140,255,.38);
      flex-shrink: 0;
      letter-spacing: -.5px;
    }
    .brand-name {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -.5px;
      line-height: 1;
    }
    .brand-name em {
      font-style: normal;
      color: var(--accent);
    }
    .brand-tag {
      margin-top: 5px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: .01em;
    }

    /* heading */
    .card-head {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 32px;
    }

    /* fields */
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      padding: 14px 18px;
      background: var(--surface-2);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,140,255,.2);
    }

    /* submit */
    .btn-submit {
      width: 100%;
      margin-top: 28px;
      padding: 16px 18px;
      background: linear-gradient(135deg, #4f8cff 0%, #6ea8ff 100%);
      border: 0;
      border-radius: 16px;
      color: #fff;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .01em;
      box-shadow: 0 8px 28px rgba(79,140,255,.32);
      transition: opacity .18s, transform .14s, box-shadow .18s;
    }
    .btn-submit:hover  { opacity:.91; transform:translateY(-1px); box-shadow:0 14px 36px rgba(79,140,255,.42); }
    .btn-submit:active { transform:translateY(0); opacity:1; }

    /* error */
    .err {
      margin-top: 18px;
      padding: 14px 18px;
      border: 1px solid rgba(251,113,133,.28);
      border-radius: 14px;
      background: rgba(251,113,133,.11);
      color: #fecdd3;
      font-size: 14px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="blob blob-blue"></div>
  <div class="blob blob-amber"></div>

  <div class="wrap">

    <!-- ═══ ANIMATED SCENE ════════════════════════════ -->
    <div class="scene-col">

      <!-- board being cut -->
      <div class="board">
        <div class="board-cut"></div>
      </div>

      <!-- sawdust -->
      <div class="dust">
        <div class="dust-p"></div><div class="dust-p"></div><div class="dust-p"></div>
        <div class="dust-p"></div><div class="dust-p"></div><div class="dust-p"></div>
        <div class="dust-p"></div>
      </div>

      <!-- SAW — realistic handsaw SVG -->
      <div class="saw-wrap">
        <svg width="210" height="52" viewBox="0 0 210 52" fill="none" overflow="visible">
          <!-- HANDLE (ergonomic pistol grip) -->
          <!-- outer grip body -->
          <path d="M155 10 Q162 6 170 8 L182 10 Q192 10 196 18 L198 28 Q198 36 190 38 L178 40 Q170 42 164 36 L158 28 Q152 24 155 10Z"
                fill="#7a4a1f" stroke="#5a3410" stroke-width="1"/>
          <!-- grip inner highlight -->
          <path d="M160 13 Q165 10 172 12 L180 14 Q186 14 188 20 L188 28 Q188 33 183 35 L174 36 Q168 37 164 32 L160 24 Q157 19 160 13Z"
                fill="#9b6030"/>
          <!-- finger grip lines -->
          <line x1="164" y1="32" x2="175" y2="34" stroke="rgba(0,0,0,.25)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="162" y1="26" x2="174" y2="27" stroke="rgba(0,0,0,.25)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="162" y1="20" x2="173" y2="20" stroke="rgba(0,0,0,.20)" stroke-width="1.5" stroke-linecap="round"/>

          <!-- BLADE — wide taper from handle to tip -->
          <!-- blade back (top straight edge) -->
          <path d="M10 12 L158 12 L162 18 L162 28 L8 30 Z"
                fill="#c8c8d0" stroke="none"/>
          <!-- blade top sheen -->
          <rect x="10" y="12" width="148" height="6" rx="1" fill="#dcdce8"/>
          <!-- blade bevel line -->
          <line x1="10" y1="18" x2="158" y2="18" stroke="rgba(255,255,255,.18)" stroke-width="1"/>

          <!-- TEETH row — sharp aggressive teeth -->
          <path d="
            M8 30
            L12 44 L16 30
            L20 44 L24 30
            L28 44 L32 30
            L36 44 L40 30
            L44 44 L48 30
            L52 44 L56 30
            L60 44 L64 30
            L68 44 L72 30
            L76 44 L80 30
            L84 44 L88 30
            L92 44 L96 30
            L100 44 L104 30
            L108 44 L112 30
            L116 44 L120 30
            L124 44 L128 30
            L132 44 L136 30
            L140 44 L144 30
            L148 44 L152 30
            L156 44 L160 30"
            fill="#b0b0be" stroke="#888898" stroke-width=".8" stroke-linejoin="round"/>

          <!-- rivet on handle -->
          <circle cx="185" cy="22" r="4" fill="#c0a060" stroke="#a08040" stroke-width="1"/>
          <circle cx="185" cy="22" r="2" fill="#e8c880"/>
        </svg>
      </div>

      <!-- HAMMER — large, striking with authority -->
      <div class="hammer-wrap">
        <svg width="130" height="200" viewBox="0 0 130 200" fill="none" overflow="visible">
          <!-- handle — long wooden grip -->
          <rect x="56" y="70" width="18" height="130" rx="9" fill="#7a4a1f"/>
          <rect x="58" y="72" width="14" height="126" rx="7" fill="#9b6030"/>
          <!-- handle grip wrap lines -->
          <line x1="58" y1="120" x2="72" y2="120" stroke="rgba(0,0,0,.2)" stroke-width="2" stroke-linecap="round"/>
          <line x1="58" y1="132" x2="72" y2="132" stroke="rgba(0,0,0,.2)" stroke-width="2" stroke-linecap="round"/>
          <line x1="58" y1="144" x2="72" y2="144" stroke="rgba(0,0,0,.2)" stroke-width="2" stroke-linecap="round"/>

          <!-- head — large sledge-style -->
          <rect x="8" y="14" width="114" height="64" rx="10" fill="#4a4a5e"/>
          <rect x="8" y="14" width="114" height="28" rx="10" fill="#5e5e72"/>
          <!-- head chamfers -->
          <rect x="10" y="16" width="110" height="4" rx="2" fill="rgba(255,255,255,.12)"/>
          <rect x="10" y="20" width="110" height="2" rx="1" fill="rgba(255,255,255,.06)"/>
          <!-- striking face highlight -->
          <rect x="96" y="16" width="22" height="60" rx="6" fill="#64647a"/>
          <rect x="98" y="18" width="18" height="12" rx="3" fill="rgba(255,255,255,.14)"/>
          <!-- left claw -->
          <path d="M8 32 Q-12 36 -8 54 Q-4 66 8 62" stroke="#4a4a5e" stroke-width="10" fill="none" stroke-linecap="round"/>
          <path d="M8 32 Q-8 36 -5 50 Q-2 60 8 58" stroke="#5e5e72" stroke-width="5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- nail -->
      <div class="nail"></div>

      <!-- impact flash -->
      <div class="flash"></div>

      <!-- sparks -->
      <div class="sparks">
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div>
      </div>

    </div>

    <!-- ═══ LOGIN CARD ════════════════════════════════ -->
    <form class="card" method="post" autocomplete="on">

      <div class="brand">
        <div class="brand-icon">D</div>
        <div>
          <div class="brand-name">Domo<em>stav</em></div>
          <div class="brand-tag">Analytická platforma</div>
        </div>
      </div>

      <div class="card-head">Přihlásit se</div>
      <p class="card-desc">Podle vaší role uvidíte jen moduly, ke kterým máte přístup.</p>

      <div class="field">
        <label for="username">Uživatelské jméno</label>
        <input id="username" name="username" autocomplete="username" required autofocus>
      </div>

      <div class="field">
        <label for="password">Heslo</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>

      <button class="btn-submit" type="submit">Přihlásit se</button>

      {% if error %}
        <div class="err">{{ error }}</div>
      {% endif %}

    </form>
  </div>
</body>
</html>
