<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080c14;
      --surface: #0f1623;
      --surface-2: #161e2e;
      --border: rgba(255,255,255,.08);
      --text: #eef2fb;
      --text-muted: #8a94ae;
      --accent: #4f8cff;
      --accent-glow: rgba(79, 140, 255, 0.22);
      --amber: #f59e0b;
      --amber-glow: rgba(245, 158, 11, 0.15);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Particle canvas bg ─────────────────────────── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ─────────────────────────────────────── */
    .login-wrap {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 420px 360px;
      gap: 60px;
      align-items: center;
      padding: 24px;
    }

    @media (max-width: 860px) {
      .login-wrap {
        grid-template-columns: 1fr;
        gap: 32px;
      }
      .scene-col { display: none; }
    }

    /* ── Scene / animation ──────────────────────────── */
    .scene-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      user-select: none;
    }

    .scene-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .scene-svg-wrap {
      position: relative;
      width: 340px;
      height: 260px;
    }

    /* ── Workbench plank ─────────────────────────────── */
    .workbench {
      position: absolute;
      bottom: 32px;
      left: 40px;
      right: 40px;
      height: 18px;
      background: linear-gradient(180deg, #7c4a1b 0%, #5a3212 100%);
      border-radius: 4px;
      box-shadow: 0 6px 20px rgba(0,0,0,.5);
    }

    /* ── Wood plank being cut ────────────────────────── */
    .plank {
      position: absolute;
      bottom: 50px;
      left: 60px;
      width: 200px;
      height: 28px;
      background: linear-gradient(180deg, #c97b2a 0%, #a35f18 100%);
      border-radius: 3px;
      box-shadow: 0 3px 10px rgba(0,0,0,.4);
      overflow: hidden;
    }

    .plank::before {
      content: '';
      position: absolute;
      inset: 3px 0 3px;
      background: repeating-linear-gradient(90deg, transparent 0, transparent 16px, rgba(0,0,0,.12) 16px, rgba(0,0,0,.12) 18px);
    }

    /* saw cut line appears */
    .plank-cut {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 128px;
      width: 2px;
      background: var(--bg);
      opacity: 0;
      animation: cut-appear 0.5s 2.1s ease-out forwards;
    }

    @keyframes cut-appear {
      from { opacity: 0; width: 1px; }
      to   { opacity: 1; width: 3px; }
    }

    /* ── SAW ─────────────────────────────────────────── */
    .saw-group {
      position: absolute;
      bottom: 44px;
      left: 40px;
      transform-origin: 0 50%;
      animation: saw-stroke 1.8s ease-in-out infinite;
    }

    @keyframes saw-stroke {
      0%   { transform: translateX(0px); }
      40%  { transform: translateX(105px); }
      42%  { transform: translateX(108px) scaleX(-1); }
      80%  { transform: translateX(3px) scaleX(-1); }
      82%  { transform: translateX(0px); }
      100% { transform: translateX(0px); }
    }

    /* sawdust particles */
    .sawdust {
      position: absolute;
      bottom: 66px;
      left: 185px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #c97b2a;
      opacity: 0;
    }

    .sawdust:nth-child(1) { animation: dust 1.8s 0.35s ease-out infinite; --dx:8px;  --dy:-12px; }
    .sawdust:nth-child(2) { animation: dust 1.8s 0.45s ease-out infinite; --dx:14px; --dy:-18px; width:3px; height:3px; }
    .sawdust:nth-child(3) { animation: dust 1.8s 0.38s ease-out infinite; --dx:-5px; --dy:-14px; width:5px; height:5px; }
    .sawdust:nth-child(4) { animation: dust 1.8s 0.5s  ease-out infinite; --dx:10px; --dy:-8px; }
    .sawdust:nth-child(5) { animation: dust 1.8s 0.42s ease-out infinite; --dx:-8px; --dy:-16px; width:3px; }

    @keyframes dust {
      0%   { opacity: 0; transform: translate(0,0); }
      10%  { opacity: 1; }
      60%  { opacity: .7; transform: translate(var(--dx), var(--dy)); }
      100% { opacity: 0; transform: translate(calc(var(--dx)*1.4), calc(var(--dy)*1.6 + 14px)); }
    }

    /* ── HAMMER ──────────────────────────────────────── */
    .hammer-group {
      position: absolute;
      top: 10px;
      right: 30px;
      transform-origin: 90% 10%;
      animation: hammer-swing 1.1s ease-in-out infinite;
    }

    @keyframes hammer-swing {
      0%   { transform: rotate(-45deg); }
      38%  { transform: rotate(22deg); }
      42%  { transform: rotate(22deg); }
      60%  { transform: rotate(-38deg); }
      100% { transform: rotate(-45deg); }
    }

    /* nail */
    .nail {
      position: absolute;
      bottom: 49px;
      right: 72px;
      width: 5px;
      height: 20px;
      background: linear-gradient(180deg, #c0c0c0, #888);
      border-radius: 1px;
      animation: nail-drive 1.1s ease-in-out infinite;
    }

    .nail-head {
      position: absolute;
      top: -4px;
      left: -3px;
      width: 11px;
      height: 6px;
      background: #a8a8a8;
      border-radius: 2px;
    }

    @keyframes nail-drive {
      0%   { height: 20px; }
      42%  { height: 10px; }
      100% { height: 20px; }
    }

    /* spark bursts on hammer hit */
    .sparks {
      position: absolute;
      bottom: 48px;
      right: 60px;
      width: 0;
      height: 0;
    }

    .spark {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--amber);
      opacity: 0;
    }

    .spark:nth-child(1) { animation: spark 1.1s 0.4s ease-out infinite; --dx: 12px;  --dy: -14px; }
    .spark:nth-child(2) { animation: spark 1.1s 0.42s ease-out infinite; --dx: -10px; --dy: -18px; background: #fcd34d; }
    .spark:nth-child(3) { animation: spark 1.1s 0.38s ease-out infinite; --dx: 18px;  --dy: -10px; background: #fbbf24; }
    .spark:nth-child(4) { animation: spark 1.1s 0.44s ease-out infinite; --dx: -6px;  --dy: -20px; width:2px; height:2px; }
    .spark:nth-child(5) { animation: spark 1.1s 0.41s ease-out infinite; --dx: 8px;   --dy: -22px; background: #fef3c7; width:2px; }

    @keyframes spark {
      0%   { opacity: 0; transform: translate(0,0) scale(1); }
      5%   { opacity: 1; }
      50%  { opacity: .8; transform: translate(var(--dx), var(--dy)) scale(.8); }
      100% { opacity: 0; transform: translate(calc(var(--dx)*.8), calc(var(--dy)*1.6 + 10px)) scale(0.3); }
    }

    /* ── SVG tool shapes ─────────────────────────────── */
    svg.tool { overflow: visible; }

    /* ── Login card ──────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px 36px;
      box-shadow:
        0 0 0 1px rgba(79,140,255,.06),
        0 24px 80px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.05);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(79,140,255,.14), transparent 70%);
      pointer-events: none;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, #4474ff, #6cb7ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 8px 24px rgba(79,140,255,.35);
    }

    .brand-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
    }

    .brand-name span { color: var(--accent); }

    .brand-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface-2);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      transition: border-color .2s ease, box-shadow .2s ease;
      outline: none;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .submit-btn {
      width: 100%;
      margin-top: 24px;
      padding: 15px 16px;
      background: linear-gradient(135deg, #4f8cff, #6ea8ff);
      border: 0;
      border-radius: 16px;
      color: white;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s ease, transform .15s ease, box-shadow .2s ease;
      box-shadow: 0 8px 24px rgba(79,140,255,.3);
      letter-spacing: .01em;
    }

    .submit-btn:hover {
      opacity: .9;
      transform: translateY(-1px);
      box-shadow: 0 12px 32px rgba(79,140,255,.4);
    }

    .submit-btn:active {
      transform: translateY(0);
      opacity: 1;
    }

    .error-msg {
      margin-top: 16px;
      padding: 13px 16px;
      border: 1px solid rgba(251,113,133,.28);
      border-radius: 14px;
      background: rgba(251,113,133,.12);
      color: #fecdd3;
      font-size: 14px;
      line-height: 1.45;
    }

    /* ── Ambient glow dots behind card ──────────────── */
    .glow-dot {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      filter: blur(80px);
    }

    .glow-dot--blue {
      width: 500px; height: 500px;
      top: -120px; left: -100px;
      background: rgba(79,140,255,.08);
    }

    .glow-dot--amber {
      width: 400px; height: 400px;
      bottom: -120px; right: -60px;
      background: rgba(245,158,11,.07);
    }
  </style>
</head>
<body>
  <div class="glow-dot glow-dot--blue"></div>
  <div class="glow-dot glow-dot--amber"></div>

  <div class="login-wrap">

    <!-- ── Animated scene ────────────────────────── -->
    <div class="scene-col">
      <div class="scene-svg-wrap">

        <!-- workbench plank -->
        <div class="workbench"></div>

        <!-- wood plank being sawn -->
        <div class="plank">
          <div class="plank-cut"></div>
        </div>

        <!-- sawdust particles -->
        <div class="sawdust"></div>
        <div class="sawdust"></div>
        <div class="sawdust"></div>
        <div class="sawdust"></div>
        <div class="sawdust"></div>

        <!-- SAW -->
        <div class="saw-group">
          <svg class="tool" width="130" height="40" viewBox="0 0 130 40" fill="none">
            <!-- handle -->
            <rect x="0" y="12" width="60" height="16" rx="8" fill="#6b4c2a"/>
            <rect x="4" y="15" width="52" height="10" rx="5" fill="#8b6237"/>
            <!-- blade body -->
            <rect x="56" y="16" width="70" height="8" rx="2" fill="#c0c0c0"/>
            <rect x="56" y="16" width="70" height="4" rx="2" fill="#d8d8d8"/>
            <!-- teeth -->
            <path d="M60 24 L63 32 L66 24 L69 32 L72 24 L75 32 L78 24 L81 32 L84 24 L87 32 L90 24 L93 32 L96 24 L99 32 L102 24 L105 32 L108 24 L111 32 L114 24 L117 32 L120 24 L123 32 L126 24" stroke="#888" stroke-width="1.5" fill="none"/>
          </svg>
        </div>

        <!-- HAMMER -->
        <div class="hammer-group">
          <svg class="tool" width="90" height="120" viewBox="0 0 90 120" fill="none">
            <!-- handle -->
            <rect x="38" y="40" width="14" height="78" rx="7" fill="#6b4c2a"/>
            <rect x="40" y="42" width="10" height="74" rx="5" fill="#8b6237"/>
            <!-- head body -->
            <rect x="14" y="10" width="62" height="38" rx="8" fill="#5c5c6e"/>
            <rect x="14" y="10" width="62" height="16" rx="8" fill="#72728a"/>
            <!-- metal sheen lines -->
            <line x1="20" y1="14" x2="70" y2="14" stroke="rgba(255,255,255,.18)" stroke-width="2" stroke-linecap="round"/>
            <!-- claw on left -->
            <path d="M14 22 Q2 24 4 36 Q6 44 14 42" stroke="#5c5c6e" stroke-width="6" fill="none" stroke-linecap="round"/>
          </svg>
        </div>

        <!-- nail -->
        <div class="nail">
          <div class="nail-head"></div>
        </div>

        <!-- sparks -->
        <div class="sparks">
          <div class="spark"></div>
          <div class="spark"></div>
          <div class="spark"></div>
          <div class="spark"></div>
          <div class="spark"></div>
        </div>

      </div>

      <div class="scene-title">Domostav — stavební analytika</div>
    </div>

    <!-- ── Login form ──────────────────────────────── -->
    <form class="card" method="post" autocomplete="on">
      <div class="brand-row">
        <div class="brand-icon">D</div>
        <div>
          <div class="brand-name">Domostav <span>AI</span></div>
          <div class="brand-sub">Analytická platforma</div>
        </div>
      </div>

      <h2>Přihlásit se</h2>
      <p class="card-desc">Podle vaší role uvidíte jen moduly, ke kterým máte přístup.</p>

      <div class="field">
        <label for="username">Uživatelské jméno</label>
        <input id="username" name="username" autocomplete="username" required autofocus>
      </div>

      <div class="field">
        <label for="password">Heslo</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>

      <button class="submit-btn" type="submit">Přihlásit se</button>

      {% if error %}
        <div class="error-msg">{{ error }}</div>
      {% endif %}
    </form>
  </div>
</body>
</html>
