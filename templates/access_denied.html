<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #eef2ff;
      font-family: Inter, system-ui, sans-serif;
    }
    .card {
      width: min(520px, calc(100vw - 32px));
      padding: 32px;
      border-radius: 24px;
      background: #141b2d;
      border: 1px solid rgba(255,255,255,.08);
    }
    h1 { margin: 0 0 10px; }
    p { color: #9aa4bf; line-height: 1.5; }
    a { color: #7fb0ff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Přístup odepřen</h1>
    <p>{{ message }}</p>
    {% if can_access_spp %}
      <p><a href="/">Zpět na hlavní modul</a></p>
    {% elif can_access_mzdovy %}
      <p><a href="/mzdovy/wizard">Zpět na mzdový přehled</a></p>
    {% else %}
      <p><a href="/logout">Odhlásit se</a></p>
    {% endif %}
  </div>
</body>
</html>
